name: News API Pusher

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      push_test_news:
        description: "Send one complete test news item to verify app display"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: news-api-pusher
  cancel-in-progress: false

jobs:
  push-news:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore dedupe state
        uses: actions/cache@v4
        with:
          path: .state
          key: news-state-${{ github.run_id }}
          restore-keys: |
            news-state-

      - name: Install dependencies
        run: npm install

      - name: Fetch and push news
        run: npm start
        env:
          APP_API_URL: ${{ secrets.APP_API_URL }}
          APP_API_KEY: ${{ secrets.APP_API_KEY }}
          NEWS_SOURCES: ${{ secrets.NEWS_SOURCES }}
          MAX_ITEMS_PER_RUN: ${{ vars.MAX_ITEMS_PER_RUN || '30' }}
          MAX_ITEMS_PER_SOURCE: ${{ vars.MAX_ITEMS_PER_SOURCE || '10' }}
          DEFAULT_STATE_CODE: ${{ vars.DEFAULT_STATE_CODE || 'haryana' }}
          DEFAULT_CITY_CODE: ${{ vars.DEFAULT_CITY_CODE || 'gurugram' }}
          ALLOW_DEFAULT_CITY_CODE: ${{ vars.ALLOW_DEFAULT_CITY_CODE || 'false' }}
          PUSH_TEST_NEWS: ${{ inputs.push_test_news || 'false' }}
