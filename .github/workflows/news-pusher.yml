name: News API Pusher

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: news-api-pusher
  cancel-in-progress: true

jobs:
  push-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore dedupe state
        uses: actions/cache@v4
        with:
          path: .state
          key: news-state-${{ github.run_id }}
          restore-keys: |
            news-state-

      - name: Install dependencies
        run: npm install

      - name: Build and verify filters
        run: npm run build

      - name: Fetch and push news
        run: npm start
        env:
          APP_API_URL: ${{ secrets.APP_API_URL }}
          APP_API_KEY: ${{ secrets.APP_API_KEY }}
          NEWS_SOURCES: ${{ secrets.NEWS_SOURCES }}
          MAX_ITEMS_PER_RUN: ${{ vars.MAX_ITEMS_PER_RUN || '30' }}
          MAX_ITEMS_PER_SOURCE: ${{ vars.MAX_ITEMS_PER_SOURCE || '4' }}
