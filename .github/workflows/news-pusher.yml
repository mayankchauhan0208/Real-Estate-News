name: News API Pusher

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      push_test_news:
        description: "Send one complete test news item to verify app display"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      resend_known_articles:
        description: "Ignore saved dedupe once and resend matching real articles"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      backfill_news:
        description: "One-time backfill by original article date using strict city rules"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      backfill_from:
        description: "Backfill start date, YYYY-MM-DD"
        required: false
        default: "2026-06-13"
        type: string
      backfill_to:
        description: "Backfill end date, YYYY-MM-DD"
        required: false
        default: "2026-06-18"
        type: string
      backfill_max_items_per_source:
        description: "How many items to scan per source during backfill"
        required: false
        default: "25"
        type: string
      backfill_max_items_per_run:
        description: "Maximum articles to push during backfill"
        required: false
        default: "120"
        type: string

concurrency:
  group: news-api-pusher
  cancel-in-progress: true

jobs:
  push-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore dedupe state
        uses: actions/cache@v4
        with:
          path: .state
          key: news-state-${{ github.run_id }}
          restore-keys: |
            news-state-

      - name: Install dependencies
        run: npm install

      - name: Build and verify filters
        run: npm run build

      - name: Fetch and push news
        run: npm start
        env:
          APP_API_URL: ${{ secrets.APP_API_URL }}
          APP_API_KEY: ${{ secrets.APP_API_KEY }}
          NEWS_SOURCES: ${{ secrets.NEWS_SOURCES }}
          MAX_ITEMS_PER_RUN: ${{ vars.MAX_ITEMS_PER_RUN || '30' }}
          MAX_ITEMS_PER_SOURCE: ${{ vars.MAX_ITEMS_PER_SOURCE || '4' }}
          PUSH_TEST_NEWS: ${{ inputs.push_test_news || 'false' }}
          RESEND_KNOWN_ARTICLES: ${{ inputs.resend_known_articles || 'false' }}
          BACKFILL_NEWS: ${{ inputs.backfill_news || 'false' }}
          BACKFILL_FROM: ${{ inputs.backfill_from || '' }}
          BACKFILL_TO: ${{ inputs.backfill_to || '' }}
          BACKFILL_MAX_ITEMS_PER_SOURCE: ${{ inputs.backfill_max_items_per_source || '25' }}
          BACKFILL_MAX_ITEMS_PER_RUN: ${{ inputs.backfill_max_items_per_run || '120' }}
