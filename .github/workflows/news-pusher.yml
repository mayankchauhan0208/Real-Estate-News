name: News API Pusher

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      backfill_from:
        description: "Only consider articles published on or after this date, e.g. 2026-06-30"
        required: false
        default: ""
      backfill_to:
        description: "Only consider articles published on or before this date, e.g. 2026-07-13"
        required: false
        default: ""
      max_items_per_source:
        description: "How many links to inspect from each source"
        required: false
        default: "300"
      max_pages_per_source:
        description: "How many paginated source pages to inspect where supported"
        required: false
        default: "15"
      max_items_per_run:
        description: "Maximum publish count for this run"
        required: false
        default: "80"
      resend_backfill:
        description: "Repost articles in the date window even if the dedupe cache says they were already sent"
        required: false
        type: boolean
        default: false
      skip_titles:
        description: "Exact titles to skip, separated by ||"
        required: false
        default: ""
      source_urls:
        description: "Optional source URLs to run instead of the default sources, separated by comma, semicolon, or newline"
        required: false
        default: ""
      extra_article_urls:
        description: "Exact extra article URLs to evaluate, separated by comma, semicolon, or newline"
        required: false
        default: ""

concurrency:
  group: news-api-pusher
  cancel-in-progress: true

jobs:
  push-news:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Restore dedupe state
        uses: actions/cache@v6
        with:
          path: .state
          key: news-state-${{ github.run_id }}
          restore-keys: |
            news-state-

      - name: Install dependencies
        run: npm install

      - name: Build and verify filters
        run: npm run build

      - name: Fetch and push news
        run: npm start
        env:
          APP_API_URL: ${{ secrets.APP_API_URL }}
          APP_API_KEY: ${{ secrets.APP_API_KEY }}
          BACKFILL_FROM: ${{ github.event.inputs.backfill_from || '' }}
          BACKFILL_TO: ${{ github.event.inputs.backfill_to || '' }}
          RESEND_BACKFILL: ${{ github.event.inputs.resend_backfill || 'false' }}
          SKIP_TITLES: ${{ github.event.inputs.skip_titles || '' }}
          SOURCE_URLS: ${{ github.event.inputs.source_urls || '' }}
          EXTRA_ARTICLE_URLS: ${{ github.event.inputs.extra_article_urls || '' }}
          MAX_ITEMS_PER_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_items_per_run || '80' }}
          MAX_ITEMS_PER_SOURCE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_items_per_source || '300' }}
          MAX_PAGES_PER_SOURCE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_pages_per_source || '15' }}
          DEFAULT_LOOKBACK_DAYS: "20"
